<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .profile {
            text-align: center;
        }

        .profile img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #333;
        }

        h1 {
            color: #333;
        }

        h2 {
            color: #555;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .section {
            margin-top: 20px;
        }

        ul {
            list-style-type: square;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Profile Section -->
    <div class="profile">
        <img src="https://via.placeholder.com/150" alt="Student Photo">
        <h1>Your Name</h1>
        <p><strong>Course:</strong> B.Sc Computer Science</p>
    </div>

    <!-- Course Details -->
    <div class="section">
        <h2>Course Details</h2>
        <p>College: XYZ College</p>
        <p>University: ABC University</p>
        <p>Year: 2nd Year</p>
    </div>

    <!-- Skills -->
    <div class="section">
        <h2>Skills</h2>
        <ul>
            <li>C Programming</li>
            <li>HTML & CSS</li>
            <li>Java Basics</li>
            <li>Problem Solving</li>
        </ul>
    </div>

    <!-- Contact Details -->
    <div class="section">
        <h2>Contact</h2>
        <p>Email: <a href="mailto:yourname@email.com">yourname@email.com</a></p>
        <p>LinkedIn: <a href="https://linkedin.com" target="_blank">View Profile</a></p>
        <p>GitHub: <a href="https://github.com" target="_blank">View Projects</a></p>
    </div>

</div>

</body>
</html>
